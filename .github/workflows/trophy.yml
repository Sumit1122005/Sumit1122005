name: Generate Trophy

on:
  schedule:
    - cron: "0 0 * * *"    # runs once a day
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate trophy SVG
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: Sumit1122005
          output_path: trophy.svg
          theme: tokyonight
          no-frame: true
          no-bg: true
          margin-w: 10
          row: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit trophy.svg
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trophy.svg
          git diff --staged --quiet || git commit -m "Update trophy.svg"
          git push
